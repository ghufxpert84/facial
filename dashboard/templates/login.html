{% extends "base.html" %}
{% block title %}Log in{% endblock %}
{% block content %}
<div class="max-w-sm mx-auto mt-16 bg-white border border-slate-200 rounded-xl shadow-sm p-8">
  <h1 class="text-xl font-semibold mb-6">Worker Tracker</h1>
  {% if error %}
  <div class="mb-4 text-sm text-red-700 bg-red-50 border border-red-200 rounded-md px-3 py-2">{{ error }}</div>
  {% endif %}
  <form method="post" action="/login" class="space-y-4">
    <div>
      <label class="block text-sm font-medium text-slate-700 mb-1">Username</label>
      <input name="username" required class="w-full rounded-md border border-slate-300 px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-slate-800">
    </div>
    <div>
      <label class="block text-sm font-medium text-slate-700 mb-1">Password</label>
      <input name="password" type="password" required class="w-full rounded-md border border-slate-300 px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-slate-800">
    </div>
    <button type="submit" class="w-full bg-slate-900 text-white rounded-md py-2 text-sm font-medium hover:bg-slate-800">Log in</button>
  </form>
</div>
{% endblock %}
