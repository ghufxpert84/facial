<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>{% block title %}Worker Tracker{% endblock %}</title>
  <style>
    body { font-family: -apple-system, Helvetica, Arial, sans-serif; margin: 2rem; color: #222; }
    table { border-collapse: collapse; width: 100%; }
    th, td { text-align: left; padding: 0.5rem; border-bottom: 1px solid #ddd; }
    th { color: #555; font-weight: 600; }
    a { color: #0b62d6; text-decoration: none; }
    a:hover { text-decoration: underline; }
    .muted { color: #888; }
    .badge { display: inline-block; padding: 0.1rem 0.5rem; border-radius: 0.75rem; background: #eef2ff; color: #3346a8; font-size: 0.85rem; }
  </style>
</head>
<body>
  <h1><a href="/">Worker Tracker</a></h1>
  {% block content %}{% endblock %}
</body>
</html>
