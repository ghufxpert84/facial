<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}Worker Tracker{% endblock %}</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-50 text-slate-900 min-h-screen">
  {% if user %}
  <nav class="bg-slate-900 text-slate-100">
    <div class="max-w-6xl mx-auto px-4 flex items-center justify-between h-14">
      <div class="flex items-center gap-6">
        <a href="/" class="font-semibold tracking-tight">Worker Tracker</a>
        <a href="/" class="text-sm text-slate-300 hover:text-white">Dashboard</a>
        {% if user.role == 'admin' %}
        <div class="relative group">
          <button class="text-sm text-slate-300 hover:text-white flex items-center gap-1">
            Admin
            <svg class="w-3 h-3" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7" /></svg>
          </button>
          <div class="absolute left-0 top-full pt-1 hidden group-hover:block z-10 w-44">
            <div class="bg-white text-slate-800 rounded-md shadow-lg border border-slate-200 py-1">
              <a href="/admin/users" class="block px-4 py-2 text-sm hover:bg-slate-100">Users</a>
              <a href="/admin/settings" class="block px-4 py-2 text-sm hover:bg-slate-100">Settings</a>
              <a href="/admin/telegram" class="block px-4 py-2 text-sm hover:bg-slate-100">Telegram</a>
              <a href="/admin/channels" class="block px-4 py-2 text-sm hover:bg-slate-100">Channels</a>
              <a href="/admin/branches" class="block px-4 py-2 text-sm hover:bg-slate-100">Branches</a>
              <a href="/admin/unrecognized" class="block px-4 py-2 text-sm hover:bg-slate-100">Unrecognized Faces</a>
              <a href="/admin/logs" class="block px-4 py-2 text-sm hover:bg-slate-100">Logs</a>
            </div>
          </div>
        </div>
        {% endif %}
      </div>
      <div class="flex items-center gap-4 text-sm text-slate-300">
        <span>{{ user.username }} <span class="text-slate-500">({{ user.role }})</span></span>
        <a href="/logout" class="hover:text-white">Logout</a>
      </div>
    </div>
  </nav>
  {% endif %}

  <main class="max-w-6xl mx-auto px-4 py-8">
    {% block content %}{% endblock %}
  </main>
</body>
</html>
