{% extends "base.html" %}
{% block title %}Name this person{% endblock %}
{% block content %}
<a href="/admin/unrecognized" class="text-sm text-slate-500 hover:text-slate-900">&larr; back to unrecognized faces</a>
<h1 class="text-xl font-semibold mt-2 mb-6">Name this person</h1>

<div class="flex gap-6 max-w-2xl">
  <img src="/admin/unrecognized/{{ candidate_id }}/photo" class="w-40 h-40 object-cover rounded-lg border border-slate-200 flex-shrink-0">

  <div class="flex-1 bg-white border border-slate-200 rounded-xl shadow-sm p-6">
    {% if error %}
    <div class="mb-4 text-sm text-red-700 bg-red-50 border border-red-200 rounded-md px-3 py-2">{{ error }}</div>
    {% endif %}
    <form method="post" action="/admin/unrecognized/{{ candidate_id }}/enroll" class="space-y-4">
      <div>
        <label class="block text-sm font-medium text-slate-700 mb-1">Name</label>
        <input name="name" required class="w-full rounded-md border border-slate-300 px-3 py-2 text-sm">
      </div>
      <div>
        <label class="block text-sm font-medium text-slate-700 mb-1">Employee ID</label>
        <input name="employee_id" required class="w-full rounded-md border border-slate-300 px-3 py-2 text-sm">
      </div>
      <div>
        <label class="block text-sm font-medium text-slate-700 mb-1">Consent date</label>
        <input name="consent_date" type="date" required class="w-full rounded-md border border-slate-300 px-3 py-2 text-sm">
        <p class="text-xs text-slate-400 mt-1">Confirm this person has consented to biometric tracking before enrolling them.</p>
      </div>
      <div>
        <label class="block text-sm font-medium text-slate-700 mb-1">Notes (optional)</label>
        <input name="notes" class="w-full rounded-md border border-slate-300 px-3 py-2 text-sm">
      </div>
      <button type="submit" class="bg-slate-900 text-white rounded-md px-4 py-2 text-sm font-medium hover:bg-slate-800">Enroll as worker</button>
    </form>
  </div>
</div>
{% endblock %}
