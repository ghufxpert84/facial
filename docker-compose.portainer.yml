# Variant for pasting into Portainer's Stack "Web editor".
#
# No environment variables at all anymore -- API credentials, thresholds,
# retention, users, and everything else are configured through the web UI
# (visit the dashboard, you'll be walked through /setup -> Admin pages) and
# stored in the shared SQLite file. This also means Portainer's earlier
# ${VAR} substitution quirks no longer matter here at all.
#
# Update the path below if you use a different folder than
# /volume1/docker/telegram-worker-tracker-data.

services:
  telegram-listener:
    image: ghcr.io/ghufxpert84/facial-telegram-listener:latest
    restart: unless-stopped
    volumes:
      - /volume1/docker/telegram-worker-tracker-data/db:/data/db
      - /volume1/docker/telegram-worker-tracker-data/incoming:/data/incoming

  face-worker:
    image: ghcr.io/ghufxpert84/facial-face-worker:latest
    restart: unless-stopped
    volumes:
      - /volume1/docker/telegram-worker-tracker-data/db:/data/db
      - /volume1/docker/telegram-worker-tracker-data/incoming:/data/incoming
      - /volume1/docker/telegram-worker-tracker-data/enrolled:/data/enrolled

  dashboard:
    image: ghcr.io/ghufxpert84/facial-dashboard:latest
    restart: unless-stopped
    volumes:
      - /volume1/docker/telegram-worker-tracker-data/db:/data/db
      - /volume1/docker/telegram-worker-tracker-data/incoming:/data/incoming:ro
    ports:
      - "127.0.0.1:8080:8080"
