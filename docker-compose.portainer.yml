# Variant for pasting into Portainer's Stack "Web editor".
#
# Now on SQLite (see project chat history / commit log for why): no more
# Postgres service, no healthcheck, no vector extension. Only plain ${VAR}
# substitutions remain (Portainer handles those fine — it was only the
# ${VAR:-default} fallback syntax and multi-variable-in-one-string patterns
# that failed to resolve).
#
# Update the path below if you use a different folder than
# /volume1/docker/telegram-worker-tracker-data.

services:
  telegram-listener:
    image: ghcr.io/ghufxpert84/facial-telegram-listener:latest
    restart: unless-stopped
    environment:
      TG_API_ID: ${TG_API_ID}
      TG_API_HASH: ${TG_API_HASH}
      TG_SESSION_STRING: ${TG_SESSION_STRING}
      TG_CHANNELS: ${TG_CHANNELS}
      POLL_INTERVAL_SECONDS: ${POLL_INTERVAL_SECONDS}
    volumes:
      - /volume1/docker/telegram-worker-tracker-data/db:/data/db
      - /volume1/docker/telegram-worker-tracker-data/incoming:/data/incoming

  face-worker:
    image: ghcr.io/ghufxpert84/facial-face-worker:latest
    restart: unless-stopped
    environment:
      POLL_INTERVAL_SECONDS: ${POLL_INTERVAL_SECONDS}
      MATCH_THRESHOLD: ${MATCH_THRESHOLD}
      RETENTION_DAYS: ${RETENTION_DAYS}
    volumes:
      - /volume1/docker/telegram-worker-tracker-data/db:/data/db
      - /volume1/docker/telegram-worker-tracker-data/incoming:/data/incoming
      - /volume1/docker/telegram-worker-tracker-data/enrolled:/data/enrolled

  dashboard:
    image: ghcr.io/ghufxpert84/facial-dashboard:latest
    restart: unless-stopped
    environment:
      DASHBOARD_USER: ${DASHBOARD_USER}
      DASHBOARD_PASSWORD_HASH: ${DASHBOARD_PASSWORD_HASH}
    volumes:
      - /volume1/docker/telegram-worker-tracker-data/db:/data/db
    ports:
      - "127.0.0.1:8080:8080"
