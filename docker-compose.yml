services:
  db:
    image: pgvector/pgvector:pg16
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - ${DATA_DIR:-./data}/db:/var/lib/postgresql/data
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10

  telegram-listener:
    build: ./telegram-listener
    restart: unless-stopped
    env_file: .env
    environment:
      DATABASE_URL: ${DATABASE_URL}
    volumes:
      - ${DATA_DIR:-./data}/incoming:/data/incoming
    depends_on:
      db:
        condition: service_healthy

  face-worker:
    build: ./face-worker
    restart: unless-stopped
    env_file: .env
    environment:
      DATABASE_URL: ${DATABASE_URL}
    volumes:
      - ${DATA_DIR:-./data}/incoming:/data/incoming
      - ${DATA_DIR:-./data}/enrolled:/data/enrolled
    depends_on:
      db:
        condition: service_healthy

  dashboard:
    build: ./dashboard
    restart: unless-stopped
    env_file: .env
    environment:
      DATABASE_URL: ${DATABASE_URL}
    volumes:
      - ${DATA_DIR:-./data}/incoming:/data/incoming:ro
    ports:
      - "127.0.0.1:8080:8080"
    depends_on:
      db:
        condition: service_healthy
