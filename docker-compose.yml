services:
  telegram-listener:
    image: ghcr.io/ghufxpert84/facial-telegram-listener:latest
    restart: unless-stopped
    volumes:
      - ${DATA_DIR:-./data}/db:/data/db
      - ${DATA_DIR:-./data}/incoming:/data/incoming

  face-worker:
    image: ghcr.io/ghufxpert84/facial-face-worker:latest
    restart: unless-stopped
    volumes:
      - ${DATA_DIR:-./data}/db:/data/db
      - ${DATA_DIR:-./data}/incoming:/data/incoming
      - ${DATA_DIR:-./data}/enrolled:/data/enrolled

  dashboard:
    image: ghcr.io/ghufxpert84/facial-dashboard:latest
    restart: unless-stopped
    volumes:
      - ${DATA_DIR:-./data}/db:/data/db
      - ${DATA_DIR:-./data}/incoming:/data/incoming:ro
      - ${DATA_DIR:-./data}/enrolled:/data/enrolled:ro
    ports:
      - "127.0.0.1:8080:8080"
